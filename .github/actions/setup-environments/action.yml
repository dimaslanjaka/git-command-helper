name: Setup CI Environment
description: Setup Node.js, Python, Bun, Corepack/Yarn, cache, virtual environment, and PATH for CI workflows

inputs:
  node-version:
    description: Node.js version to install
    required: true
  python-version:
    description: Python version to install (skip Python setup if empty)
    required: false
    default: ""
  prefix-cache-key:
    description: Prefix for cache keys
    required: false
    default: "${{ runner.os }}-"
  token:
    description: GitHub token for accessing resources
    required: false
    default: "${{ github.token }}"

outputs:
  CACHE_YARN:
    description: Yarn cache folder
    value: ${{ steps.set-env.outputs.CACHE_YARN }}
  CACHE_NPM:
    description: NPM cache folder
    value: ${{ steps.set-env.outputs.CACHE_NPM }}
  CACHE_NPM_USER_GLOBAL:
    description: NPM user global cache
    value: ${{ steps.set-env.outputs.CACHE_NPM_USER_GLOBAL }}
  PIP_CACHE_DIR:
    description: Pip cache dir
    value: ${{ steps.set-env.outputs.PIP_CACHE_DIR }}
  CURRENT_YARN_VERSION:
    description: Current Yarn version
    value: ${{ steps.set-env.outputs.CURRENT_YARN_VERSION }}
  GITHUB_BRANCH:
    description: Git branch name
    value: ${{ steps.set-env.outputs.GITHUB_BRANCH }}
  GITHUB_SHA_SHORT:
    description: Short git sha
    value: ${{ steps.set-env.outputs.GITHUB_SHA_SHORT }}
  GITHUB_COMMIT_URL:
    description: Commit URL
    value: ${{ steps.set-env.outputs.GITHUB_COMMIT_URL }}
  GITHUB_RUNNER_URL:
    description: Runner URL
    value: ${{ steps.set-env.outputs.GITHUB_RUNNER_URL }}
  PACKAGE_MANAGER:
    description: Detected package manager
    value: ${{ steps.set-env.outputs['PACKAGE-MANAGER'] }}
  MACHINE:
    description: Detected machine/os
    value: ${{ steps.set-env.outputs.machine }}
  CACHE_HIT:
    description: Whether cache restore was a hit
    value: ${{ steps.cache.outputs.cache-hit }}

runs:
  using: composite

  steps:
    - name: ⬇️ Checkout test-repo
      uses: actions/checkout@v6
      with:
        repository: dimaslanjaka/test-repo
        path: tmp/test-repo
        token: ${{ inputs.token }}
        ref: test

    - name: ⬇️ Checkout packages/git-command-helper
      uses: actions/checkout@v6
      with:
        repository: dimaslanjaka/git-command-helper
        path: packages/git-command-helper
        token: ${{ inputs.token }}
        ref: pre-release

    - name: ⬇️ Checkout packages/cross-spawn
      uses: actions/checkout@v6
      with:
        repository: dimaslanjaka/node-cross-spawn
        path: packages/cross-spawn
        token: ${{ inputs.token }}
        ref: private

    - name: "🔁 Pull & update submodules recursively"
      continue-on-error: true
      shell: bash
      run: |
        if [ -f ".gitmodules" ] && [ -s ".gitmodules" ]; then
          git submodule update --init --recursive
          git submodule update --recursive --remote
          git pull -X theirs
          echo "init submodules"
          git submodule init
          git submodule foreach "git submodule init"
          echo "sync submodules"
          git submodule sync
          git submodule foreach "git submodule sync"
          echo "update submodules"
          npx -y rimraf .git/modules
          npx --legacy-peer-deps -y binary-collections@https://raw.githubusercontent.com/dimaslanjaka/bin/master/releases/bin.tgz submodule-install
        else
          echo "No submodules found or .gitmodules is empty, skipping update."
          exit 0
        fi

    - name: 🟢 Setup Node.js
      uses: actions/setup-node@v6
      with:
        node-version: ${{ inputs.node-version }}

    - name: 🐍 Setup Python
      if: inputs.python-version != ''
      uses: actions/setup-python@v6
      with:
        python-version: ${{ inputs.python-version }}

    - name: "⚙️ Set EOL git configs"
      continue-on-error: true
      shell: bash
      run: |
        git config core.eol lf
        git config core.autocrlf input
        git checkout-index --force --all

    - name: "🧁 Setup Bun"
      uses: oven-sh/setup-bun@v2
      with:
        bun-version: "latest"
        registries: |
          https://registry.npmjs.org/
          @dimaslanjaka:https://npm.pkg.github.com/|${{ inputs.token }}

    - name: "🧰 Enable Corepack & prepare Yarn"
      shell: bash
      run: |
        corepack enable
        corepack prepare yarn@4.13.0 --activate
        curl -L https://raw.githubusercontent.com/dimaslanjaka/nodejs-package-types/refs/heads/main/.yarnrc-template.yml -o .yarnrc.yml
        yarn set version 4.13.0

    - name: "🌎 Set environment variables"
      id: set-env
      shell: bash
      run: |
        echo "${HOME}/.local/bin" >> $GITHUB_PATH
        echo "${GITHUB_WORKSPACE}/bin" >> $GITHUB_PATH
        echo "${GITHUB_WORKSPACE}/node_modules/.bin" >> $GITHUB_PATH
        echo "GITHUB_SHA_SHORT=$(echo $GITHUB_SHA | cut -c 1-6)" >> $GITHUB_ENV
        echo "GITHUB_SHA_SHORT=$(echo $GITHUB_SHA | cut -c 1-6)" >> $GITHUB_OUTPUT
        echo "GITHUB_BRANCH=${GITHUB_REF#refs/heads/}" >> $GITHUB_ENV
        echo "GITHUB_BRANCH=${GITHUB_REF#refs/heads/}" >> $GITHUB_OUTPUT
        echo "GITHUB_COMMIT_URL=https://github.com/${{ github.repository }}/commit/$(echo $GITHUB_SHA)" >> $GITHUB_ENV
        echo "GITHUB_COMMIT_URL=https://github.com/${{ github.repository }}/commit/$(echo $GITHUB_SHA)" >> $GITHUB_OUTPUT
        echo "GITHUB_RUNNER_URL=https://github.com/${{ github.repository }}/commit/${{ github.sha }}/checks/${{ github.run_id }}" >> $GITHUB_ENV
        echo "GITHUB_RUNNER_URL=https://github.com/${{ github.repository }}/commit/${{ github.sha }}/checks/${{ github.run_id }}" >> $GITHUB_OUTPUT
        echo "CACHE_NPM=$(npm config get cache)" >> $GITHUB_ENV
        echo "CACHE_NPM=$(npm config get cache)" >> $GITHUB_OUTPUT

        YARN_CURRENT=$(yarn -v)
        YARN_VERSION_MAJOR=$(echo "$YARN_CURRENT" | cut -d. -f1)
        echo "CURRENT_YARN_VERSION=$YARN_CURRENT" >> "$GITHUB_ENV"
        echo "CURRENT_YARN_VERSION=$YARN_CURRENT" >> "$GITHUB_OUTPUT"

        if [ "$YARN_VERSION_MAJOR" -ge 2 ]; then
          CACHE_YARN=$(yarn config get cacheFolder)
        else
          CACHE_YARN=$(yarn cache dir)
        fi

        echo "CACHE_YARN=$CACHE_YARN" >> "$GITHUB_ENV"
        echo "CACHE_YARN=$CACHE_YARN" >> "$GITHUB_OUTPUT"
        echo "architecture=$(getconf LONG_BIT)" >> $GITHUB_ENV
        if [ -f "package-lock.json" ]; then
            echo "PACKAGE-MANAGER=npm" >> $GITHUB_OUTPUT
            echo "PACKAGE-MANAGER=npm" >> $GITHUB_ENV
        else
            echo "PACKAGE-MANAGER=yarn" >> $GITHUB_OUTPUT
            echo "PACKAGE-MANAGER=yarn" >> $GITHUB_ENV
        fi
        unameOut="$(uname -s)"
        case "${unameOut}" in
            Linux*)     machine=linux;;
            Darwin*)    machine=mac;;
            CYGWIN*)    machine=cygwin;;
            MINGW*)     machine=mingw;;
            *)          machine="unknown:${unameOut}"
        esac
        echo "machine=$machine" >> $GITHUB_OUTPUT
        echo "machine=$machine" >> $GITHUB_ENV
        if command -v pip >/dev/null 2>&1; then
          echo "PIP_CACHE_DIR=$(pip cache dir)" >> "$GITHUB_OUTPUT"
        fi
        mkdir -p "${HOME}/.npm-global"
        npm config set prefix "${HOME}/.npm-global"
        echo "${HOME}/.npm-global/bin" >> $GITHUB_PATH
        echo "CACHE_NPM_USER_GLOBAL=${HOME}/.npm-global" >> $GITHUB_ENV
        echo "CACHE_NPM_USER_GLOBAL=${HOME}/.npm-global" >> $GITHUB_OUTPUT

    - name: 📚 Restore Cache
      id: cache
      uses: actions/cache@v5
      with:
        path: |
          **/.yarn
          **/node_modules
          **/.venv
          **/venv
          **/__pycache__
          **/*.pyc
          **/.cache
          **/release*
          **/*.lock
          **/tmp
          **/dist
          **/lib
          binaries/
          databases/
          coverage/
          **/package-lock.json
          ${{ steps.set-env.outputs.CACHE_YARN }}
          ${{ steps.set-env.outputs.CACHE_NPM }}
          ${{ steps.set-env.outputs.CACHE_NPM_USER_GLOBAL }}
          ${{ steps.set-env.outputs.PIP_CACHE_DIR }}
        key: ${{ inputs.prefix-cache-key }}${{ hashFiles('**/package.json', '**/requirements*.txt') }}
        restore-keys: |
          ${{ inputs.prefix-cache-key }}
          ${{ runner.os }}-

    - name: 🐍 Create virtual environment
      if: inputs.python-version != '' && steps.cache.outputs.cache-hit != 'true'
      shell: bash
      run: |
        python -m venv .venv
        source .venv/bin/activate

        python -m pip install --upgrade pip setuptools wheel

        if [ -f requirements.txt ]; then
          pip install -r requirements.txt
        fi

        if [ -f requirements-dev.txt ]; then
          pip install -r requirements-dev.txt
        fi

    - name: "🌐 Install global packages"
      if: steps.cache.outputs.cache-hit != 'true'
      shell: bash
      run: npm i -g typescript ts-node gulp-cli hexo-cli webpack-cli

    - name: Add custom bins to PATH
      shell: bash
      run: |
        BIN_DIRS=(
          "${{ github.workspace }}/node_modules/.bin"
          "${{ github.workspace }}/vendor/bin"
          "${{ github.workspace }}/.venv/bin"
          "${{ github.workspace }}/venv/bin"
          "${{ github.workspace }}/bin"
          "${{ github.workspace }}/binaries"
        )

        for dir in "${BIN_DIRS[@]}"; do
          if [ -d "$dir" ]; then
            chmod -R +x "$dir" || true
            echo "$dir" >> "$GITHUB_PATH"
          fi
        done

    - name: "🗑️ Remove packageManager from package.json"
      shell: bash
      run: |
        if command -v jq >/dev/null 2>&1; then
          jq 'del(.packageManager)' package.json > temp.json && mv temp.json package.json
          awk 'NR==1{print $0} NR>1{print $0} END{print ""}' package.json > temp.json && mv temp.json package.json
        else
          node -e "let f='package.json';let j=require('./'+f);delete j.packageManager;require('fs').writeFileSync(f,JSON.stringify(j,null,2)+'\n');"
        fi

    - name: "🔗 Export composite action outputs"
      shell: bash
      run: |
        echo "CACHE_YARN=${{ steps.set-env.outputs.CACHE_YARN }}" >> $GITHUB_OUTPUT
        echo "CACHE_NPM=${{ steps.set-env.outputs.CACHE_NPM }}" >> $GITHUB_OUTPUT
        echo "CACHE_NPM_USER_GLOBAL=${{ steps.set-env.outputs.CACHE_NPM_USER_GLOBAL }}" >> $GITHUB_OUTPUT
        echo "PIP_CACHE_DIR=${{ steps.set-env.outputs.PIP_CACHE_DIR }}" >> $GITHUB_OUTPUT
        echo "CURRENT_YARN_VERSION=${{ steps.set-env.outputs.CURRENT_YARN_VERSION }}" >> $GITHUB_OUTPUT
        echo "GITHUB_BRANCH=${{ steps.set-env.outputs.GITHUB_BRANCH }}" >> $GITHUB_OUTPUT
        echo "GITHUB_SHA_SHORT=${{ steps.set-env.outputs.GITHUB_SHA_SHORT }}" >> $GITHUB_OUTPUT
        echo "GITHUB_COMMIT_URL=${{ steps.set-env.outputs.GITHUB_COMMIT_URL }}" >> $GITHUB_OUTPUT
        echo "GITHUB_RUNNER_URL=${{ steps.set-env.outputs.GITHUB_RUNNER_URL }}" >> $GITHUB_OUTPUT
        echo "PACKAGE_MANAGER=${{ steps.set-env.outputs['PACKAGE-MANAGER'] }}" >> $GITHUB_OUTPUT
        echo "MACHINE=${{ steps.set-env.outputs.machine }}" >> $GITHUB_OUTPUT
        echo "CACHE_HIT=${{ steps.cache.outputs.cache-hit }}" >> $GITHUB_OUTPUT
